# Build and deploy static site to GitHub Pages (Vite).
# After first push: Repo → Settings → Pages → Source: GitHub Actions.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Must match repository name for project pages: /<repo>/
          BASE_PATH: /portfolio/

      - name: Verify bundle is not gsap-trial
        run: |
          if grep -rE 'gsap-trial|requires-membership|source=trial' dist/ 2>/dev/null; then
            echo "::error::Trial GSAP strings found in dist — use standard gsap package only."
            exit 1
          fi
          echo "OK: no trial GSAP markers in dist"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
